<script type="module">
// 🔥 IMPORT
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

// 🔐 LOGIN
const USERNAME="VertexAdmin";
const PASSWORD="221051";
let isAdmin=false;

// 🌙 THEME
window.toggleTheme = ()=> document.body.classList.toggle("light");

// 🔥 CONFIG
const firebaseConfig = {
  apiKey:"AIzaSyCPOwfw-1sz2YwIrTGUutuCBr3xnECiVW8",
  authDomain:"vertexmodz.firebaseapp.com",
  projectId:"vertexmodz",
  storageBucket:"vertexmodz.appspot.com"
};

// 🚀 INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// 📊 STATUS UI (ต้องมี element id="dbStatus")
const statusEl = document.getElementById("dbStatus");

// 📡 CHECK FIRESTORE
let firstLoad = true;
try {
  onSnapshot(collection(db,"skins"), (snap)=>{
    if(firstLoad){
      statusEl.innerHTML="✅ เชื่อมต่อ Firestore สำเร็จ";
      statusEl.style.color="lightgreen";
      firstLoad=false;
    }

    skinsList.innerHTML="";
    snap.forEach(docSnap=>{
      let d=docSnap.data();

      skinsList.innerHTML+=`
      <div class="card">
        <h3>${d.name}</h3>
        <img src="${d.image}">
        <br><br>
        <a href="${d.file}" target="_blank">
          <button class="main">ดาวน์โหลด</button>
        </a>

        ${isAdmin?`
        <button class="main" onclick="editSkin('${docSnap.id}','${d.name}','${d.file}','${d.image}')">แก้ไข</button>
        <button class="main danger" onclick="deleteSkin('${docSnap.id}','${d.image}')">ลบ</button>
        `:""}
      </div>`;
    });
  }, (error)=>{
    statusEl.innerHTML="❌ เชื่อมต่อ Firestore ไม่สำเร็จ";
    statusEl.style.color="red";
    console.error(error);
  });
}catch(e){
  statusEl.innerHTML="❌ เชื่อมต่อ Firestore ไม่สำเร็จ";
}

// ➕ ADD
window.addSkin = function(){
  let name=nameInput.value;
  let file=fileUrl.value;
  let fileImg=imageFile.files[0];

  if(!name||!file) return alert("กรอกข้อมูล");

  if(fileImg){
    let storageRef = ref(storage,"skins/"+Date.now());
    let task = uploadBytesResumable(storageRef,fileImg);

    task.on("state_changed",(snap)=>{
      let percent=(snap.bytesTransferred/snap.totalBytes)*100;
      progressBar.style.width=percent+"%";
    },null,()=>{
      getDownloadURL(task.snapshot.ref).then(url=>{
        saveData(name,file,url);
        progressBar.style.width="0%";
      });
    });
  }else{
    saveData(name,file,null);
  }
};

async function saveData(name,file,image){
  await addDoc(collection(db,"skins"),{name,file,image});
  nameInput.value="";
  fileUrl.value="";
  imageFile.value="";
}

// 🗑️ DELETE
window.deleteSkin = async function(id,imageUrl){
  if(confirm("ลบจริง?")){
    if(imageUrl){
      let imageRef = ref(storage,imageUrl);
      await deleteObject(imageRef).catch(()=>{});
    }
    await deleteDoc(doc(db,"skins",id));
  }
};

// ✏️ EDIT
window.editSkin = function(id,name,file,image){
  nameInput.value=name;
  fileUrl.value=file;
};

// 🔐 LOGIN
window.login = function(){
  if(user.value===USERNAME && pass.value===PASSWORD){
    isAdmin=true;
    logoutBtn.style.display="inline";
    showPage("admin");
  }else alert("ผิด");
};

window.logout = function(){
  isAdmin=false;
  logoutBtn.style.display="none";
  showPage("skins");
};

// 📄 PAGE
window.showPage = function(p){
  skinsPage.style.display="none";
  adminPage.style.display="none";
  loginPage.style.display="none";

  if(p==="skins") skinsPage.style.display="block";
  else {
    if(isAdmin) adminPage.style.display="block";
    else loginPage.style.display="block";
  }
};
</script>
